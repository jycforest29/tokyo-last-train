<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>shuden.tokyo 서버 구조도</title>
  <style>
    body { margin: 0; padding: 24px; background: #f7f7f5; font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif; color: #111; }
    h1 { margin: 0 0 4px 0; font-size: 24px; }
    .sub { color: #666; font-size: 13px; margin-bottom: 16px; }
    svg { background: #fff; border: 1px solid #e3e3e0; border-radius: 8px; max-width: 100%; height: auto; display: block; }
    .legend { margin-top: 12px; font-size: 12px; color: #555; display: flex; gap: 24px; flex-wrap: wrap; }
    .legend span::before { content: ""; display: inline-block; width: 24px; height: 0; border-top: 2px solid; vertical-align: middle; margin-right: 6px; }
    .legend .runtime::before { border-color: #444; }
    .legend .deploy::before { border-color: #2563eb; border-style: dashed; }
    .legend .seo::before { border-color: #16a34a; border-style: dotted; }
  </style>
</head>
<body>
  <h1>shuden.tokyo Architecture</h1>
  <div class="sub">Cloudflare edge → AWS → Spring Boot 백엔드 · ODPT 실시간 데이터</div>

  <svg viewBox="0 0 1320 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0 0 L10 5 L0 10 z" fill="#444"/>
      </marker>
      <marker id="arrow-deploy" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
      </marker>
      <marker id="arrow-seo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/>
      </marker>
    </defs>

    <style>
      .box { fill: #fff; stroke: #999; stroke-width: 1.5; }
      .ec2-box { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; }
      .cf-box { fill: #fff7ed; stroke: #f48120; stroke-width: 2; }
      .user-box { fill: #f0f9ff; stroke: #0284c7; stroke-width: 1.5; }
      .gsc-box { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; }
      .external-box { fill: #fafafa; stroke: #9ca3af; stroke-width: 1.5; stroke-dasharray: 4,3; }
      .label-title { font-size: 16px; font-weight: 700; fill: #111; }
      .label-sub { font-size: 12px; fill: #666; }
      .label-line { font-size: 12px; fill: #222; }
      .label-port { font-size: 11px; fill: #888; font-family: ui-monospace, monospace; }
      .arrow-label { font-size: 11px; fill: #444; }
      .arrow-label-bg { fill: #fff; }
      .conn { stroke: #444; stroke-width: 1.5; fill: none; }
      .conn-deploy { stroke: #2563eb; stroke-width: 1.5; stroke-dasharray: 5,3; fill: none; }
      .conn-seo { stroke: #16a34a; stroke-width: 1.5; stroke-dasharray: 2,2; fill: none; }
      .group-title { font-size: 11px; font-weight: 600; fill: #888; letter-spacing: 0.05em; }
    </style>

    <!-- Group titles -->
    <text x="50" y="60" class="group-title">DEVELOPER (LOCAL)</text>
    <text x="500" y="60" class="group-title">PRODUCTION (AWS ap-northeast-2)</text>
    <text x="980" y="60" class="group-title">EDGE / DISCOVERY</text>

    <!-- ============ DEVELOPER COLUMN ============ -->

    <!-- IntelliJ + build tools -->
    <rect class="box" x="40" y="90" width="320" height="180" rx="8"/>
    <image href="https://cdn.simpleicons.org/intellijidea/000000" x="56" y="106" width="36" height="36"/>
    <text x="106" y="120" class="label-title">IntelliJ + Local build</text>
    <text x="106" y="138" class="label-sub">Java 21 · Node 18+ · Maven</text>
    <line x1="56" y1="158" x2="344" y2="158" stroke="#e5e7eb"/>
    <image href="https://cdn.simpleicons.org/nodedotjs/3c873a" x="60" y="174" width="22" height="22"/>
    <text x="92" y="190" class="label-line">npm run build → frontend/dist/</text>
    <image href="https://cdn.simpleicons.org/apachemaven/c71a36" x="60" y="208" width="22" height="22"/>
    <text x="92" y="224" class="label-line">mvn package → target/*.jar</text>
    <image href="https://cdn.simpleicons.org/openssh/444444" x="60" y="240" width="22" height="22"/>
    <text x="92" y="256" class="label-line">scp + ssh deploy.sh</text>

    <!-- GitHub -->
    <rect class="box" x="40" y="320" width="320" height="100" rx="8"/>
    <image href="https://cdn.simpleicons.org/github/000000" x="56" y="340" width="36" height="36"/>
    <text x="106" y="354" class="label-title">GitHub</text>
    <text x="106" y="372" class="label-sub">jycforest29/tokyo-last-train</text>
    <text x="106" y="394" class="label-line" fill="#666">소스 보관 (현재 빌드는 안 함)</text>

    <!-- arrow IntelliJ -> GitHub (git push) -->
    <path class="conn" d="M 200 270 V 320" marker-end="url(#arrow)"/>
    <rect class="arrow-label-bg" x="208" y="285" width="58" height="16" rx="3"/>
    <text x="237" y="297" class="arrow-label" text-anchor="middle">git push</text>

    <!-- ============ PRODUCTION (CENTER) ============ -->

    <!-- EC2 outer box -->
    <rect class="ec2-box" x="430" y="90" width="500" height="500" rx="10"/>
    <image href="https://cdn.simpleicons.org/amazonec2/ff9900" x="446" y="104" width="32" height="32"/>
    <text x="488" y="118" class="label-title">AWS EC2</text>
    <text x="488" y="134" class="label-sub">Amazon Linux · Cloudflare 뒤에 위치</text>

    <!-- nginx box (inside EC2) -->
    <rect class="box" x="460" y="170" width="440" height="120" rx="6"/>
    <image href="https://cdn.simpleicons.org/nginx/009639" x="476" y="184" width="30" height="30"/>
    <text x="516" y="196" class="label-title">Nginx</text>
    <text x="516" y="212" class="label-port">SPA 정적 서빙 + /api/* 백엔드 프록시</text>
    <text x="476" y="240" class="label-line">• <tspan font-family="ui-monospace,monospace">location /</tspan> → SPA dist (정적 파일)</text>
    <text x="476" y="260" class="label-line">• <tspan font-family="ui-monospace,monospace">location /api/</tspan> → Spring Boot 프록시</text>
    <text x="476" y="280" class="label-line">• <tspan font-family="ui-monospace,monospace">/actuator/</tspan> → 외부 차단</text>

    <!-- SPA static files (inside EC2) -->
    <rect class="box" x="460" y="320" width="200" height="100" rx="6"/>
    <text x="476" y="345" class="label-title">SPA static</text>
    <text x="476" y="362" class="label-sub">React 빌드 산출물</text>
    <text x="476" y="384" class="label-line">index.html, assets/*</text>
    <text x="476" y="402" class="label-line">sitemap.xml, robots.txt</text>

    <!-- Spring Boot (inside EC2) -->
    <rect class="box" x="685" y="320" width="215" height="180" rx="6"/>
    <image href="https://cdn.simpleicons.org/springboot/6db33f" x="700" y="332" width="30" height="30"/>
    <text x="740" y="345" class="label-title">Spring Boot</text>
    <text x="740" y="361" class="label-port">Java 21 · Reverse RAPTOR engine</text>
    <text x="700" y="388" class="label-line">- /api/v1/* (route, station,</text>
    <text x="700" y="404" class="label-line">  fare, transfer, alt routes)</text>
    <text x="700" y="424" class="label-line">- ODPT 인메모리 캐시</text>
    <text x="700" y="440" class="label-line">  (94 railway · 720 station ·</text>
    <text x="700" y="456" class="label-line">  18.5k timetable · 49k fare)</text>
    <text x="700" y="476" class="label-line">- /actuator/health</text>

    <!-- env vars (inside EC2) -->
    <rect class="box" x="460" y="440" width="200" height="60" rx="6"/>
    <text x="476" y="463" class="label-title" font-size="13">Env vars</text>
    <text x="476" y="482" class="label-sub">ODPT API key 등</text>
    <text x="476" y="496" class="label-line" font-size="11">systemd EnvironmentFile</text>

    <!-- arrow nginx -> SPA static -->
    <path class="conn" d="M 560 290 V 320" marker-end="url(#arrow)"/>
    <text x="510" y="310" class="arrow-label">정적 파일</text>
    <!-- arrow nginx -> Spring Boot -->
    <path class="conn" d="M 790 290 V 320" marker-end="url(#arrow)"/>
    <text x="800" y="310" class="arrow-label">/api/* proxy</text>
    <!-- arrow Spring Boot -> .env (read) -->
    <path class="conn" d="M 685 470 H 660" marker-end="url(#arrow)"/>
    <text x="612" y="465" class="arrow-label" font-size="10">read</text>

    <!-- systemd service unit text -->
    <rect class="box" x="460" y="525" width="440" height="60" rx="6" fill="#fafafa"/>
    <text x="476" y="548" class="label-title" font-size="13">systemd</text>
    <text x="476" y="566" class="label-sub">Restart=on-failure · 자동 재기동 + 헬스체크</text>

    <!-- ============ EDGE / RIGHT COLUMN ============ -->

    <!-- User -->
    <rect class="user-box" x="980" y="90" width="300" height="110" rx="8"/>
    <image href="https://cdn.simpleicons.org/googlechrome/4285f4" x="996" y="106" width="36" height="36"/>
    <text x="1046" y="120" class="label-title">User (browser)</text>
    <text x="1046" y="138" class="label-sub">Japanese commuters · mobile/desktop</text>
    <text x="996" y="170" class="label-line">HTTP/3 (QUIC) · HTTP/2 · TLSv1.3</text>
    <text x="996" y="188" class="label-line">https://shuden.tokyo</text>

    <!-- Cloudflare -->
    <rect class="cf-box" x="980" y="240" width="300" height="240" rx="8"/>
    <image href="https://cdn.simpleicons.org/cloudflare/f48120" x="996" y="254" width="36" height="36"/>
    <text x="1046" y="268" class="label-title">Cloudflare</text>
    <text x="1046" y="286" class="label-sub">Tokyo edge PoP</text>
    <line x1="996" y1="305" x2="1264" y2="305" stroke="#fed7aa"/>
    <text x="996" y="326" class="label-line">• 권위 DNS</text>
    <text x="996" y="346" class="label-line">• TLS 종료 (Universal cert)</text>
    <text x="996" y="366" class="label-line">• Always Use HTTPS</text>
    <text x="996" y="386" class="label-line">• 정적 자산 CDN 캐시</text>
    <text x="996" y="406" class="label-line">• Bot/DDoS 방어</text>
    <text x="996" y="426" class="label-line">• Origin IP 은닉</text>
    <text x="996" y="446" class="label-line">• Analytics &amp; Logs</text>

    <!-- Google Search Console -->
    <rect class="gsc-box" x="980" y="520" width="300" height="100" rx="8"/>
    <image href="https://cdn.simpleicons.org/googlesearchconsole/4285f4" x="996" y="536" width="32" height="32"/>
    <text x="1042" y="552" class="label-title">Google Search Console</text>
    <text x="996" y="582" class="label-line">- sitemap.xml 제출</text>
    <text x="996" y="602" class="label-line">- URL 색인 요청</text>

    <!-- ODPT API external -->
    <rect class="external-box" x="980" y="640" width="300" height="100" rx="8"/>
    <text x="996" y="668" class="label-title">ODPT API</text>
    <text x="996" y="686" class="label-sub">도쿄공공교통오픈데이터</text>
    <text x="996" y="708" class="label-line">JR · 도쿄메트로 · 도에이 · 사철</text>
    <text x="996" y="726" class="label-line">시간표 · 요금 · 노선 데이터</text>

    <!-- ============ CONNECTIONS ============ -->

    <!-- User <-> Cloudflare -->
    <path class="conn" d="M 1130 200 V 240" marker-end="url(#arrow)"/>
    <rect class="arrow-label-bg" x="1138" y="215" width="50" height="14" rx="3"/>
    <text x="1163" y="226" class="arrow-label" text-anchor="middle">HTTPS</text>

    <!-- Cloudflare -> EC2 (Nginx) -->
    <path class="conn" d="M 980 340 H 950 Q 920 340 920 320 V 220 H 900" marker-end="url(#arrow)"/>
    <rect class="arrow-label-bg" x="888" y="212" width="40" height="14" rx="3"/>
    <text x="908" y="223" class="arrow-label" text-anchor="middle">HTTP</text>

    <!-- Spring Boot -> ODPT (egress HTTPS) -->
    <path class="conn" d="M 900 460 H 940 Q 970 460 970 540 V 690" marker-end="url(#arrow)"/>
    <rect class="arrow-label-bg" x="932" y="450" width="58" height="14" rx="3"/>
    <text x="961" y="461" class="arrow-label" text-anchor="middle">HTTPS API</text>

    <!-- IntelliJ -> EC2 (deploy) -->
    <path class="conn-deploy" d="M 360 220 H 405 Q 425 220 425 215 V 215" marker-end="url(#arrow-deploy)"/>
    <rect class="arrow-label-bg" x="358" y="200" width="78" height="14" rx="3"/>
    <text x="397" y="211" class="arrow-label" text-anchor="middle" fill="#2563eb">scp + ssh</text>

    <!-- GSC discovery -> User (curve up the right side) -->
    <path class="conn-seo" d="M 1280 560 H 1300 V 150 H 1280" marker-end="url(#arrow-seo)"/>
    <rect class="arrow-label-bg" x="1268" y="350" width="60" height="14" rx="3"/>
    <text x="1298" y="361" class="arrow-label" text-anchor="middle" fill="#16a34a">검색 유입</text>
  </svg>

  <div class="legend">
    <span class="runtime">runtime traffic (HTTP/HTTPS)</span>
    <span class="deploy">manual deploy (scp + ssh)</span>
    <span class="seo">SEO / search discovery</span>
  </div>
</body>
</html>
