name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Bundle frontend into Spring static
        run: |
          rm -rf src/main/resources/static
          mkdir -p src/main/resources/static
          cp -r frontend/dist/* src/main/resources/static/

      - name: Build backend JAR
        run: mvn -B package -DskipTests

      - name: Setup SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload artifacts
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          JAR=$(ls target/last-train-*.jar | grep -v original | head -1)
          scp -i ~/.ssh/deploy_key "$JAR" "$EC2_USER@$EC2_HOST:/opt/tokyo-last-train/app.jar.new"
          scp -i ~/.ssh/deploy_key -r frontend/dist/. "$EC2_USER@$EC2_HOST:/opt/tokyo-last-train/frontend/"
          scp -i ~/.ssh/deploy_key scripts/deploy.sh "$EC2_USER@$EC2_HOST:/opt/tokyo-last-train/deploy.sh"

      - name: Run remote deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" 'sudo /opt/tokyo-last-train/deploy.sh'

      - name: Smoke test
        run: |
          sleep 3
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://shuden.tokyo/)
            if [ "$code" = "200" ]; then echo "site healthy ($code)"; exit 0; fi
            echo "attempt $i: HTTP $code, retrying..."
            sleep 5
          done
          echo "site failed health check"
          exit 1
